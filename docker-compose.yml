version: "3.9"

services:
  esus:
    # Depois de publicado no Docker Hub, troque as 3 linhas de "build"
    # por: image: seu-usuario/esus-server:5.4.38
    build:
      context: .
    image: esus-server:5.4.38
    container_name: esus_server
    privileged: true
    cgroup: host

    extra_hosts:
      - "esusserver.local:127.0.0.1"

    volumes:
      - esus_data:/opt/e-SUS   # inclui app, banco e os certificados (opt/e-SUS/certs)

    ports:
      - "8080:8080"
      - "8443:443"
      - "5433:5433"

    restart: "no"

    networks:
      - esus-net

networks:
  esus-net:
    driver: bridge

volumes:
  esus_data: